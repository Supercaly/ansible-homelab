---
proxmox_host: vega
proxmox_lxc:
  vmid: 1041
  hostname: "{{ inventory_hostname }}"
  password: "{{ lxc_default_password }}"
  pubkey: "{{ lxc_default_pubkey }}"
  template:
    name: "{{ lxc_default_template }}"
    timeout: "{{ lxc_default_template_timeout }}"
  disk_volume:
    storage: "local-lvm"
    size: 8
  cores: 2
  memory: 2048
  netif:
    net0: >-
      name={{ interfaces.lan.device }},ip={{
        (interfaces.lan.ip4.address ~ '/' ~ interfaces.lan.ip4.prefix) |
        ansible.utils.ipaddr('host/prefix')
      }},gw={{
        network.gw4
      }},bridge=vmbr0
  nameserver: "{{ dns.servers | join(',') }}"
  searchdomain: "{{ dns.search_domains | join(',') }}"
  onboot: true
  startup: "order=101"
  features:
    - "keyctl=1"
    - "nesting=1"
  tags:
    - "database"
