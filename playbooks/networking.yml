---
- name: Configure dns server.
  hosts: dns
  become: true
  gather_facts: false
  roles:
    - role: hosts
      tags: hosts
      vars:
        hosts_domain: >-
          {{
            dns.search_domains |
            ansible.builtin.first |
            ansible.builtin.mandatory
          }}
    - role: adguardhome
      tags: dns

- name: Configure reverse proxy.
  hosts: proxy
  become: true
  gather_facts: false
  tags: caddy
  pre_tasks:
    - name: Generate 'caddy_site' variable from dynamic services.
      ansible.builtin.set_fact:
        caddy_sites: >-
          {{
            groups['all'] |
            map('ansible.builtin.extract', hostvars) |
            selectattr('caddy_sites', 'defined') |
            map(attribute='caddy_sites') |
            list |
            flatten
          }}
  roles:
    - role: caddy
