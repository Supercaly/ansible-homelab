---
- name: Load Package manager-specific vars.
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_pkg_mgr }}.yml"
        - main.yml
      paths:
        - "vars"

- name: Check network connectivity.
  ansible.builtin.include_tasks: network_check.yml
  when: update_network_check | bool

- name: Update system with APT.
  ansible.builtin.include_tasks: apt.yml
  when: ansible_pkg_mgr == 'apt'

- name: Update system with APK.
  ansible.builtin.include_tasks: apk.yml
  when: ansible_pkg_mgr == 'apk'

- name: Update system with DNF.
  ansible.builtin.include_tasks: dnf.yml
  when: ansible_pkg_mgr in ['yum', 'dnf', 'dnf5']

- name: Update system with Pacman.
  ansible.builtin.include_tasks: pacman.yml
  when: ansible_pkg_mgr == 'pacman'

- name: Ensure dependencies are present.
  ansible.builtin.package:
    name: "{{ update_install_packages }}"
    state: present
