---
immich_root: "/opt/immich"

immich_version: "release"
immich_restart: "unless-stopped"
immich_port: 2283
immich_timezone: "UTC"

# Upload and database storage locations (host paths)
immich_upload_location: "{{ immich_root }}/library"
immich_db_data_location: "{{ immich_root }}/postgres"

# Database credentials
immich_db_username: "postgres"
immich_db_name: "immich"
