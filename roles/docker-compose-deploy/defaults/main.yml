---
# defaults file for roles/docker-compose-deploy
compose_target_dir: "/compose/{{ compose_project_name }}"

compose_src_dir: "{{ playbook_dir }}"
compose_files_dir: "{{ compose_src_dir }}/files"
compose_templates_dir: "{{ compose_src_dir }}/templates"

compose_exclude_files:
  - ".gitignore"
  - ".gitkeep"

compose_pull_images: false
compose_prune_images: true
compose_prune_dangling_images: true

compose_owner: "root"
compose_group: "root"
compose_mode: "0755"
