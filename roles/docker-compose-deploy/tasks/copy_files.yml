---
- name: Ensure compose target directory exists.
  ansible.builtin.file:
    path: "{{ compose_target_dir }}"
    state: directory
    owner: "{{ compose_owner }}"
    group: "{{ compose_group }}"
    mode: "{{ compose_mode }}"

# TODO: Add ability to set owner/group/mode per file.
#   Add a `compose_files` variable that maps file names
#   to owner/group/mode that will be used to override
#   the default value per file.
- name: Ensure directories from files exist.
  ansible.builtin.file:
    path: "{{ compose_target_dir }}/{{ item.path }}"
    state: directory
    owner: "{{ compose_owner }}"
    group: "{{ compose_group }}"
    mode: "{{ compose_mode }}"
  when: item.state == 'directory'
  with_community.general.filetree: "{{ compose_files_dir }}"
  loop_control:
    label: "{{ item.path }}"

- name: Deploy static (non-template) files.
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ compose_target_dir }}/{{ item.path }}"
    owner: "{{ compose_owner }}"
    group: "{{ compose_group }}"
    mode: "{{ compose_mode }}"
  when: >-
    item.state == 'file' and
    (not item.path.endswith('.j2')) and
    (not item.path | basename in compose_exclude_files)
  with_community.general.filetree: "{{ compose_files_dir }}"
  loop_control:
    label: "{{ item.path }}"

- name: Ensure directories from templates exist.
  ansible.builtin.file:
    path: "{{ compose_target_dir }}/{{ item.path }}"
    state: directory
    owner: "{{ compose_owner }}"
    group: "{{ compose_group }}"
    mode: "{{ compose_mode }}"
  when: item.state == 'directory'
  with_community.general.filetree: "{{ compose_templates_dir }}"
  loop_control:
    label: "{{ item.path }}"

- name: Deploy template files.
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ compose_target_dir }}/{{ item.path | regex_replace('.j2','') }}"
    owner: "{{ compose_owner }}"
    group: "{{ compose_group }}"
    mode: "{{ compose_mode }}"
  when: >-
    item.state == 'file' and
    item.path.endswith('.j2') and
    (not item.path | basename in compose_exclude_files)
  with_community.general.filetree: "{{ compose_templates_dir }}"
  loop_control:
    label: "{{ item.path }}"
