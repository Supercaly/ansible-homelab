---
- name: Manage system groups.
  ansible.builtin.group:
    name: "{{ item.name | ansible.builtin.mandatory }}"
    gid: "{{ item.gid | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    system: "{{ item.system | default(false) }}"
  loop: "{{ system_groups }}"
  loop_control:
    label: "{{ item.name }}"
