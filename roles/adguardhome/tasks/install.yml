---
- name: Download latest version of AdGuardHome.
  ansible.builtin.unarchive:
    src: "{{ adguardhome_download_url }}"
    dest: "{{ adguardhome_bin_dir }}"
    remote_src: true
    include:
      - "./AdGuardHome/AdGuardHome"
    extra_opts:
      - "--strip-components=2"
    owner: "{{ adguardhome_user }}"
    group: "{{ adguardhome_group }}"
    mode: "0755"
    creates: "{{ adguardhome_bin_dir }}/AdGuardHome"

- name: Allow binary to bind to ports lower than 1024 as a non-root user
  community.general.capabilities:
    path: "{{ adguardhome_bin_file }}"
    capability: cap_net_bind_service+eip
    state: present
  when: adguardhome_user != "root"

- name: Disallow binary to bind to ports lower than 1024 as a non-root user
  community.general.capabilities:
    path: "{{ adguardhome_bin_file }}"
    capability: cap_net_bind_service+eip
    state: absent
  when: adguardhome_user == "root"

- name: Copy systemd service.
  ansible.builtin.template:
    src: adguardhome.service.j2
    dest: "/etc/systemd/system/{{ adguardhome_service_name }}.service"
    mode: "0644"
  notify: reload systemd daemon

- name: Ensure handlers are notified before enabling new service.
  ansible.builtin.meta: flush_handlers

- name: Ensure service is enabled at boot.
  ansible.builtin.service:
    name: "{{ adguardhome_service_name }}"
    enabled: "{{ adguardhome_service_enabled }}"
